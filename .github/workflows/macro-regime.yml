name: Macro Regime Daily Update

on:
  workflow_dispatch:
  schedule:
    # UTC time. 23:30 UTC is safely after US cash equity market close.
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

       - name: Verify dependencies
        run: |
          python -c "import pandas; import numpy; import yfinance; print('dependencies OK')"
        
      - name: Run macro regime update
        run: |
          python runner.py \
            --previous-regime auto \
            --output reports/latest.md \
            --json-output data/latest.json \
            --history-csv data/history.csv

      - name: Commit report outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest.md data/latest.json data/history.csv
          git commit -m "Update macro regime report" || echo "No changes to commit"
          git push
